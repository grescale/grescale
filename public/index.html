<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grescale - PocketBase Alternative</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <!-- Tailwind CSS for quick styling -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen text-gray-800 font-sans p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
      <h1 class="text-3xl font-bold mb-4 text-blue-600">Grescale</h1>
      <p class="mb-6">
        A PocketBase alternative built with Bun, HTMX, and Postgres.
      </p>

      <div class="space-y-4">
        <div class="p-4 border rounded bg-gray-50">
          <h2 class="font-semibold mb-2">HTMX Basic Example</h2>
          <button
            hx-get="/hello"
            hx-target="#hello-result"
            class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded transition"
          >
            Say Hello
          </button>
          <div id="hello-result" class="mt-3 text-sm text-gray-600">
            Click the button to load content via HTMX.
          </div>
        </div>

        <div class="p-4 border rounded bg-gray-50">
          <h2 class="font-semibold mb-2">Postgres Database Test</h2>
          <button
            hx-get="/api/time"
            hx-target="#db-result"
            class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded transition"
          >
            Get Database Time
          </button>
          <p class="mt-3 text-sm text-gray-600">
            DB Time: <span id="db-result">Not fetched yet</span>
          </p>
        </div>

        <!-- Auth Test -->
        <div class="p-4 border rounded bg-gray-50 flex flex-col gap-3">
          <h2 class="font-semibold mb-2">Auth Endpoint (`_users`)</h2>
          <form
            hx-post="/internal/api/auth/login"
            hx-target="#auth-result"
            class="flex flex-col gap-2 max-w-sm"
          >
            <input
              name="email"
              type="email"
              value="admin@grescale.local"
              class="border p-2 rounded"
              placeholder="Email"
              required
            />
            <input
              name="password"
              type="password"
              value="admin123"
              class="border p-2 rounded"
              placeholder="Password"
              required
            />
            <button
              type="submit"
              class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded transition"
            >
              Login
            </button>
          </form>
          <div id="auth-result"></div>

          <div class="mt-4 pt-4 border-t border-gray-200">
            <a
              href="/admin"
              class="inline-block bg-gray-800 hover:bg-black text-white px-4 py-2 rounded transition font-medium text-sm"
            >
              → Go to Admin Dashboard
            </a>
            <p class="text-xs text-gray-500 mt-2">
              Requires successful login first.
            </p>
          </div>
        </div>

        <!-- Dynamic Collections Test -->
        <div class="p-4 border rounded bg-gray-50 flex flex-col gap-3">
          <h2 class="font-semibold mb-2">Dynamic Collections API Test</h2>
          <div>
            <button
              hx-get="/api/collections/_users/records"
              hx-target="#collection-result"
              class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded transition"
            >
              Get `_users` Collection Records
            </button>
            <ul id="collection-result" class="mt-4 list-disc space-y-2"></ul>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
