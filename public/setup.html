<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grescale — Initial Setup</title>

    <script>
      (function () {
        try {
          var s = localStorage.getItem("grescale-theme");
          var d = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (s === "dark" || (!s && d))
            document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => lucide.createIcons());
      tailwind.config = { darkMode: "class" };
    </script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      :root {
        --bg: #f1f3f5;
        --card: #ffffff;
        --border: #e4e6eb;
        --text: #18181b;
        --muted: #71717a;
        --primary: #4f46e5;
        --pf: #ffffff;
        --input-bg: #ffffff;
        --input-bd: #d4d4d8;
        --ring: rgba(79, 70, 229, 0.35);
        --success-bg: #f0fdf4;
        --success-bd: #86efac;
        --success-fg: #15803d;
        --error-bg: #fef2f2;
        --error-bd: #fecaca;
        --error-fg: #b91c1c;
      }
      .dark {
        --bg: #121212;
        --card: #18181b;
        --border: #27272a;
        --text: #f4f4f5;
        --muted: #a1a1aa;
        --primary: #6366f1;
        --pf: #ffffff;
        --input-bg: #18181b;
        --input-bd: #3f3f46;
        --ring: rgba(99, 102, 241, 0.4);
        --success-bg: #052e16;
        --success-bd: #166534;
        --success-fg: #4ade80;
        --error-bg: #450a0a;
        --error-bd: #7f1d1d;
        --error-fg: #fca5a5;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        background: var(--bg);
        color: var(--text);
        padding: 1rem;
        position: relative;
        overflow: hidden;
      }

      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 360px;
        display: flex;
        flex-direction: column;
        gap: 1.75rem;
        animation: enterUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes enterUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        text-align: center;
      }
      .logo {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        background: var(--primary);
        color: var(--pf);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1.25rem;
        box-shadow: 0 4px 14px rgba(79, 70, 229, 0.25);
      }
      .brand-name {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.5px;
      }
      .brand-sub {
        font-size: 0.875rem;
        color: var(--muted);
        margin-top: -0.15rem;
        font-weight: 400;
      }

      .card {
        margin: 0 auto;
        width: 420px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      .form-group + .form-group {
        margin-top: 1.25rem;
      }

      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text);
        padding: 8px 12px 2px 12px;
      }

      label .hint {
        display: block;
        font-size: 0.75rem;
        font-weight: 400;
        color: var(--muted);
        margin-top: 2px;
      }

      .inputWrapper {
        width: 100%;
        background: var(--input-bg);
        border-radius: 6px;
        overflow: hidden;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }

      .inputWrapper:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--ring);
      }

      input[type="email"],
      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 2px 12px 8px 12px;
        background: transparent;
        color: var(--text);
        font-size: 0.875rem;
        font-family: inherit;
        border: none;
        outline: none;
      }
      input::placeholder {
        color: var(--muted);
      }

      .hint-text {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 0.375rem;
        line-height: 1.4;
      }
      .hint-text code {
        font-size: inherit;
        background: var(--border);
        border-radius: 3px;
        padding: 1px 4px;
      }

      .submit-btn {
        width: 100%;
        height: 44px;
        margin-top: 1.5rem;
        border-radius: 6px;
        border: none;
        background: var(--primary);
        color: var(--pf);
        font-size: 0.875rem;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          filter 0.15s,
          transform 0.1s;
      }
      .submit-btn:hover {
        filter: brightness(1.1);
      }
      .submit-btn:active {
        transform: scale(0.99);
      }

      #setup-error:empty {
        display: none;
      }
      .msg {
        padding: 0.625rem 0.875rem;
        border-radius: 8px;
        font-size: 0.8125rem;
        margin-top: 0.75rem;
      }
      .msg-error {
        background: var(--error-bg);
        border: 1px solid var(--error-bd);
        color: var(--error-fg);
      }
      .msg-success {
        background: var(--success-bg);
        border: 1px solid var(--success-bd);
        color: var(--success-fg);
      }

      .theme-btn {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        transition: color 0.15s;
      }
      .theme-btn:hover {
        color: var(--text);
      }

      #global-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(3px);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 2.5px solid var(--border);
        border-top-color: var(--primary);
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
      <i
        data-lucide="sun"
        style="width: 16px; height: 16px"
        class="dark:hidden"
      ></i>
      <i
        data-lucide="moon"
        style="width: 16px; height: 16px"
        class="hidden dark:block"
      ></i>
    </button>

    <div class="container">
      <!-- Brand -->
      <div class="brand">
        <div class="logo">G</div>
        <div>
          <div class="brand-name">Grescale</div>
          <div class="brand-sub">Create your first admin account</div>
        </div>
      </div>

      <!-- Card -->
      <div class="card">
        <div id="setup-error"></div>

        <form
          hx-post="/internal/api/auth/setup"
          hx-target="#setup-error"
          hx-swap="innerHTML"
        >
          <div class="form-group">
            <div class="inputWrapper">
              <label for="setup-email">Admin Email</label>
              <input
                id="setup-email"
                type="email"
                name="email"
                required
                autocomplete="email"
                placeholder="admin@example.com"
              />
            </div>
          </div>

          <div class="form-group">
            <div class="inputWrapper">
              <label for="setup-password">
                Password
                <span class="hint">Minimum 8 characters</span>
              </label>
              <input
                id="setup-password"
                type="password"
                name="password"
                minlength="8"
                required
                autocomplete="new-password"
                placeholder="••••••••"
              />
            </div>
          </div>

          <div class="form-group">
            <div class="inputWrapper">
              <label for="setup-token">Setup Token</label>
              <input
                id="setup-token"
                type="password"
                name="setup_token"
                required
                autocomplete="off"
                placeholder="••••••••••••"
              />
            </div>
            <p class="hint-text">
              Printed in the server log at first boot, or set via the
              <code>SETUP_TOKEN</code> environment variable.
            </p>
          </div>

          <button type="submit" class="submit-btn">Create Admin Account</button>
        </form>
      </div>
    </div>

    <div id="global-loader"><div class="spinner"></div></div>

    <script>
      function toggleTheme() {
        var isDark = document.documentElement.classList.toggle("dark");
        try {
          localStorage.setItem("grescale-theme", isDark ? "dark" : "light");
        } catch (e) {}
        lucide.createIcons();
      }

      document.body.addEventListener("htmx:afterRequest", function (evt) {
        if (evt.detail.successful && evt.detail.xhr.status === 200) {
          try {
            var res = JSON.parse(evt.detail.xhr.response);
            if (res.success) {
              document.getElementById("setup-error").innerHTML =
                '<div class="msg msg-success">Admin account created. Redirecting to login…</div>';
              setTimeout(function () {
                window.location.href = "/login";
              }, 1500);
            }
          } catch (e) {}
        }
      });

      document.body.addEventListener("htmx:send", function () {
        var l = document.getElementById("global-loader");
        if (l) {
          l.style.opacity = "1";
          l.style.pointerEvents = "auto";
        }
      });
      document.body.addEventListener("htmx:afterRequest", function () {
        var l = document.getElementById("global-loader");
        if (l) {
          l.style.opacity = "0";
          l.style.pointerEvents = "none";
        }
      });
    </script>
  </body>
</html>
