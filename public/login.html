<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grescale — Login</title>

    <!-- Resolve theme before paint -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("grescale-theme");
          var d = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (s === "dark" || (!s && d))
            document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => lucide.createIcons());
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      :root {
        --bg: #f1f3f5;
        --card: #ffffff;
        --border: #e4e6eb;
        --text: #18181b;
        --muted: #71717a;
        --primary: #4f46e5;
        --primary-f: #ffffff;
        --input-bg: #ffffff;
        --input-bd: #d4d4d8;
        --ring: rgba(79, 70, 229, 0.35);
        --error-bg: #fef2f2;
        --error-bd: #fecaca;
        --error-fg: #b91c1c;
      }
      .dark {
        --bg: #121212;
        --card: #18181b;
        --border: #27272a;
        --text: #f4f4f5;
        --muted: #a1a1aa;
        --primary: #6366f1;
        --primary-f: #ffffff;
        --input-bg: #18181b;
        --input-bd: #3f3f46;
        --ring: rgba(99, 102, 241, 0.4);
        --error-bg: #450a0a;
        --error-bd: #7f1d1d;
        --error-fg: #fca5a5;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        background: var(--bg);
        color: var(--text);
        padding: 1rem;
        position: relative;
        overflow: hidden;
      }

      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 1.75rem;
        animation: enterUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes enterUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Logo + brand */
      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        text-align: center;
      }
      .logo {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        background: var(--primary);
        color: var(--primary-f);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1.25rem;
        box-shadow: 0 4px 14px rgba(79, 70, 229, 0.25);
        letter-spacing: -0.5px;
      }
      .brand-name {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.5px;
      }
      .brand-sub {
        font-size: 0.875rem;
        color: var(--muted);
        margin-top: -0.15rem;
        font-weight: 400;
      }

      /* Card */
      .card {
        margin: 0 auto;
        width: 420px;
      }

      /* Form */
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      .form-group + .form-group {
        margin-top: 1.25rem;
      }

      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text);
        padding: 8px 12px 2px 12px;
      }

      .inputWrapper {
        width: 100%;
        background: var(--input-bg);
        border-radius: 6px;
        overflow: hidden;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }

      .inputWrapper:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--ring);
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 2px 12px 8px 12px;
        background: transparent;
        color: var(--text);
        font-size: 0.875rem;
        font-family: inherit;
        border: none;
        outline: none;
      }

      input::placeholder {
        color: var(--muted);
      }

      .submit-btn {
        width: 100%;
        height: 44px;
        margin-top: 1.5rem;
        border-radius: 6px;
        border: none;
        background: var(--primary);
        color: var(--primary-f);
        font-size: 0.875rem;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition:
          opacity 0.15s,
          transform 0.1s,
          filter 0.15s;
      }
      .submit-btn:hover {
        filter: brightness(1.1);
      }
      .submit-btn:active {
        transform: scale(0.99);
      }

      #login-error:empty {
        display: none;
      }
      .error-msg {
        margin-top: 0.75rem;
        padding: 0.625rem 0.875rem;
        border-radius: 8px;
        background: var(--error-bg);
        border: 1px solid var(--error-bd);
        color: var(--error-fg);
        font-size: 0.8125rem;
      }

      /* Theme toggle (floating top-right) */
      .theme-btn {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .theme-btn:hover {
        color: var(--text);
      }

      /* Loader */
      #global-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(3px);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 2.5px solid var(--border);
        border-top-color: var(--primary);
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <!-- Theme toggle -->
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
      <i
        data-lucide="sun"
        style="width: 16px; height: 16px; display: block"
        class="dark:hidden"
      ></i>
      <i
        data-lucide="moon"
        style="width: 16px; height: 16px; display: none"
        class="hidden dark:block"
      ></i>
    </button>

    <div class="container">
      <!-- Brand -->
      <div class="brand">
        <div class="logo">G</div>
        <div>
          <div class="brand-name">Grescale</div>
          <div class="brand-sub">Sign in to your admin account</div>
        </div>
      </div>

      <!-- Card -->
      <div class="card">
        <form hx-post="/internal/api/auth/login" hx-target="#login-error">
          <div class="form-group">
            <div class="inputWrapper">
              <label for="login-email">Email</label>
              <input
                id="login-email"
                type="email"
                name="email"
                required
                autocomplete="email"
                placeholder="admin@example.com"
              />
            </div>
          </div>
          <div class="form-group">
            <div class="inputWrapper">
              <label for="login-password">Password</label>
              <input
                id="login-password"
                type="password"
                name="password"
                required
                autocomplete="current-password"
                placeholder="••••••••"
              />
            </div>
          </div>

          <div id="login-error"></div>

          <button type="submit" class="submit-btn">
            <i data-lucide="log-in" style="width: 16px; height: 16px"></i>
            Sign in
          </button>
        </form>
      </div>
    </div>

    <!-- Loader -->
    <div id="global-loader">
      <div class="spinner"></div>
    </div>

    <script>
      function toggleTheme() {
        var isDark = document.documentElement.classList.toggle("dark");
        try {
          localStorage.setItem("grescale-theme", isDark ? "dark" : "light");
        } catch (e) {}
        lucide.createIcons();
      }
      document.body.addEventListener("htmx:send", function () {
        var l = document.getElementById("global-loader");
        if (l) {
          l.style.opacity = "1";
          l.style.pointerEvents = "auto";
        }
      });
      document.body.addEventListener("htmx:afterRequest", function () {
        var l = document.getElementById("global-loader");
        if (l) {
          l.style.opacity = "0";
          l.style.pointerEvents = "none";
        }
      });
    </script>
  </body>
</html>
